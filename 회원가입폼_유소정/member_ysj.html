<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMUSE_Membership_Form</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/member-ysj.css">
    <script src="js/mamber.js"></script>

    <!-- 파비콘 -->
    <link rel="shortcut icon" href="favicon/favicon.ico">

</head>
<body>  

    <a href="#main" class="skip">본문 바로가기</a>

    <header id="header" >
            <img class="a" src="img/icon.arrow.png" alt="뒤로가기">
            <h1> <a href="#"><img src="img/logo.png" alt="LOGO"></a></h1>
            <img class="b" src="img/icon.home.png" alt="홈">
    </header>
    

    <main id="main">
  <div class="join">
    <h2>회원가입</h2>

    <form action="#" method="post" name="member" onsubmit="return joinCheck()">
      <section class="basic">
        <fieldset class="field_basic">
          <legend>기본정보</legend>

          <div class="info_box">
            <div class="info_row">
              <div class="info_title">
                <label for="id">아이디</label> <span>*</span>
              </div>
              <div class="info_input">
                <input type="text" class="user_id" id="id" minlength="6" maxlength="10"
                placeholder="(영문소문자/숫자포함 6~10자)" name="id">
              </div>
            </div>

            <div class="info_row">
              <div class="info_title">
                <label for="pw" >비밀번호</label> <span>*</span>
              </div>
              <div class="info_input">
                <input type="password" class="user_pw" id="pw" minlength="10" maxlength="16"
                placeholder="(영문대소문자 / 숫자/특수문자 2종 이상 10~16자)" name="password">
              </div>
            </div>

            <div class="info_row">
              <div class="info_title">
                <label for="pw2" >비밀번호 확인</label> <span>*</span>
              </div>
              <div class="info_input">
                <input type="password" class="user_pw2" id="pw2"name="pass_confirm">
              </div>
            </div>

            <div class="info_row">
              <div class="info_title">
                <label for="name" >이름</label> <span>*</span>
              </div>
              <div class="info_input">
                <input type="text" class="user_name" id="name"name="name">
              </div>
            </div>

            <div class="info_row">
              <div class="info_title">
                <label for="address"  >주소</label> <span>*</span>
              </div>
              <div class="info_input">
                <input type="text" class="user_address" id="address"name="address">
              </div>
            </div>

            <div class="info_row">
              <div class="info_title">
                <label for="phone" >전화번호</label> <span>*</span>
              </div>
              <div class="info_input">
                <input type="tel" class="user_phone" id="phone" name="ph">
              </div>
            </div>

            <div class="info_row">
              <div class="info_title">
                <label for="email"  >이메일</label> <span>*</span>
              </div>
              <div class="info_input">
                <input type="email" class="user_email" id="email" name="email" >
              </div>
            </div>
          </div>
        </fieldset>
      </section>

      <section class="extra">
        <fieldset class="field_extra">
          <legend>추가정보</legend>

          <div class="info_box">
            <div class="info_row">
              <div class="info_title" name="" >생년월일</div>
              <div class="birth">
                <input type="date" class="birth_input" name="birth">

                <label>
                  <input type="radio" name="solar" checked>
                  양력
                </label>

                <label>
                  <input type="radio" name="solar" >
                  음력
                </label>
              </div>
            </div>
          </div>
        </fieldset>
      </section>

      <section class="agree">
      <fieldset class="field_agree">
      <legend>이용약관 확인</legend>

      <label>
      <input type="checkbox" id="agree_all">
      이용약관 및 개인정보 수집 및 이용, 쇼핑정보 수신(선택)에 모두 동의합니다.
      </label>

      <label>
      <input type="checkbox" id="agree1" >
      (필수) 이용약관 동의
      </label>

      <label>
      <input type="checkbox" id="agree2" >
      (필수) 개인정보 수집 및 이용 동의
      </label>

      <label>
      <input type="checkbox" id="agree_sms">
      (선택) SMS 수신동의
      </label>

      <label>
      <input type="checkbox" id="agree_email">
      (선택) 이메일 수신동의
      </label>
     </fieldset>
  </section>

      <div class="btn_area">
      <button type="reset" class="reset">취소</button>
      <button type="submit" class="submit">회원가입</button>
      </div>

    </form>
  </div>
</main>

</body>
</html>
